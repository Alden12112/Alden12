<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>win10bet 后台</title>
  <style>
    :root {
      --bg: #071013;
      --panel: #101a1f;
      --panel-2: #18242b;
      --line: #26363f;
      --text: #eef6f7;
      --muted: #9eb0b6;
      --brand: #19c37d;
      --brand-2: #ffcf4a;
      --danger: #ff5f57;
      --shadow: 0 14px 40px rgba(0, 0, 0, .26);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background: linear-gradient(135deg, rgba(25, 195, 125, .14), transparent 34%), var(--bg);
      font-family: Arial, "Microsoft YaHei", sans-serif;
    }
    button, input, select { font: inherit; }
    button {
      border: 0;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
    }
    input, select {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 11px;
      color: var(--text);
      background: #0a1418;
      outline: none;
    }
    h1, h2, h3, p { margin: 0; }
    .shell { max-width: 1180px; margin: 0 auto; padding: 16px; }
    .brand {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 24px; }
    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #06110d;
      background: var(--brand);
    }
    .card, .panel {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(16, 26, 31, .94);
      box-shadow: var(--shadow);
    }
    .card { padding: 14px; }
    .panel { padding: 12px; }
    .grid { display: grid; grid-template-columns: 340px 1fr; gap: 14px; align-items: start; }
    .stack { display: grid; gap: 12px; }
    .field { display: grid; gap: 7px; margin-bottom: 12px; color: var(--muted); font-size: 13px; }
    .primary {
      width: 100%;
      min-height: 42px;
      border-radius: 6px;
      color: #06110d;
      background: var(--brand);
      font-weight: 900;
    }
    .secondary {
      min-height: 38px;
      border-radius: 6px;
      padding: 0 12px;
      border: 1px solid var(--line);
    }
    .ghost { background: transparent; }
    .danger { background: rgba(255, 95, 87, .15); color: #ffd4d1; border-color: rgba(255, 95, 87, .35); }
    .notice {
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(25, 195, 125, .12);
      border: 1px solid rgba(25, 195, 125, .28);
      color: #c9ffe7;
      font-size: 13px;
      line-height: 1.45;
      margin-bottom: 14px;
    }
    .row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 9px 0;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .row:last-child { border-bottom: 0; }
    .muted { color: var(--muted); font-size: 13px; }
    table { width: 100%; border-collapse: collapse; font-size: 12px; }
    th, td { padding: 9px 6px; border-bottom: 1px solid var(--line); text-align: left; vertical-align: top; }
    th { color: var(--muted); font-weight: 600; }
    td button { margin: 0 4px 4px 0; }
    .rates { display: grid; gap: 12px; }
    .rate-group {
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      border: 1px solid var(--line);
    }
    .rate-group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 9px;
      color: var(--text);
      font-weight: 900;
    }
    .rate-group-head span {
      color: var(--brand-2);
      font-size: 12px;
    }
    .rate-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 10px;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      padding: 12px;
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(16, 26, 31, .94), rgba(24, 36, 43, .96));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }
    .stat-card span { color: var(--muted); font-size: 12px; }
    .stat-card strong { display: block; margin-top: 7px; font-size: 22px; color: var(--brand-2); }
    .ops-monitor {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin: -2px 0 14px;
    }
    .ops-card {
      min-height: 118px;
      padding: 12px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 92% 10%, rgba(255,207,74,.12), transparent 34%),
        linear-gradient(145deg, rgba(16, 26, 31, .94), rgba(24, 36, 43, .96));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      display: grid;
      gap: 8px;
    }
    .ops-card h3 {
      margin: 0;
      color: var(--text);
      font-size: 14px;
    }
    .ops-card p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }
    .ops-metrics {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }
    .ops-metrics span {
      min-height: 42px;
      padding: 7px;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .ops-metrics strong {
      display: block;
      margin-top: 3px;
      color: var(--brand-2);
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pending-detail {
      display: grid;
      gap: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.25;
      margin-top: 4px;
    }
    .pending-detail strong { color: var(--brand-2); }
    .filters {
      display: grid;
      grid-template-columns: 1fr 1fr 160px;
      gap: 8px;
      margin-bottom: 10px;
    }
    .quick-filters {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin: -2px 0 10px;
    }
    .quick-filter {
      min-height: 30px;
      border-radius: 999px;
      padding: 0 11px;
      color: var(--text);
      background: rgba(255,255,255,.05);
      border: 1px solid var(--line);
      font-size: 12px;
      font-weight: 800;
    }
    .quick-filter.active {
      color: #06110d;
      background: var(--brand-2);
      border-color: transparent;
    }
    .log-summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .log-summary div {
      min-height: 54px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--line);
    }
    .log-summary span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 5px;
    }
    .log-summary strong {
      color: var(--brand-2);
      font-size: 18px;
    }
    .cleanup-panel {
      margin-top: 12px;
      display: grid;
      gap: 8px;
      padding: 10px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 90% 12%, rgba(251,191,36,.14), transparent 32%),
        rgba(255,255,255,.04);
      border: 1px solid var(--line);
    }
    .cleanup-panel h3 {
      margin: 0;
      color: var(--text);
      font-size: 14px;
    }
    .cleanup-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 7px;
    }
    .cleanup-grid div {
      min-height: 48px;
      display: grid;
      align-content: center;
      gap: 3px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.08);
    }
    .cleanup-grid span {
      color: var(--muted);
      font-size: 10px;
      font-weight: 800;
    }
    .cleanup-grid strong {
      color: #d9fff0;
      font-size: 13px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .log-insights {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 10px;
    }
    .log-insight {
      min-height: 64px;
      padding: 10px;
      border-radius: 8px;
      background:
        radial-gradient(circle at 88% 18%, rgba(22,181,111,.14), transparent 30%),
        rgba(255,255,255,.04);
      border: 1px solid var(--line);
      display: grid;
      align-content: center;
      gap: 4px;
    }
    .log-insight span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .log-insight strong {
      color: #d9fff0;
      font-size: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (max-width: 760px) {
      .log-insights {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }
    .user-mini {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .user-mini h3 {
      margin: 0 0 6px;
      color: var(--text);
      font-size: 14px;
    }
    .user-mini-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      padding: 8px;
      border-radius: 8px;
      background: rgba(255,255,255,.035);
      border: 1px solid var(--line);
      font-size: 12px;
    }
    .user-mini-row strong {
      color: var(--brand-2);
    }
    .user-mini-row .muted {
      font-size: 11px;
    }
    .user-alerts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      margin-top: 12px;
    }
    .user-alert {
      min-height: 70px;
      display: grid;
      align-content: center;
      gap: 4px;
      padding: 10px;
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255,255,255,.055), rgba(255,255,255,.025));
      border: 1px solid var(--line);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.025);
    }
    .user-alert span {
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
    }
    .user-alert strong {
      color: var(--brand-2);
      font-size: 16px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .user-actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 7px;
      margin-top: 10px;
    }
    .user-actions .secondary {
      width: 100%;
      padding: 0 8px;
      font-size: 12px;
    }
    .status-win { color: #86efac; font-weight: 900; }
    .status-lose { color: #fca5a5; font-weight: 900; }
    .status-pending { color: #fde68a; font-weight: 900; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      transform: translateX(-50%) translateY(12px);
      opacity: 0;
      padding: 12px 14px;
      border-radius: 8px;
      color: #06110d;
      background: var(--brand-2);
      font-weight: 900;
      transition: opacity .18s ease, transform .18s ease;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    @media (max-width: 780px) {
      .grid, .stats, .filters, .ops-monitor { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="brand">
      <div class="logo"><span class="mark">W</span>win10bet 后台</div>
      <button class="secondary ghost" id="backToSite">返回前台</button>
    </div>
    <div class="notice">独立后台：搜索注册用户名、给积分、审核积分申请、设置测试账号下一局结果、查看最近 7 天流水。测试结果只用于上架前验证游戏，不会隐藏在用户端。</div>
    <div class="stats" id="adminStats"></div>
    <div class="ops-monitor" id="opsMonitor"></div>
    <div class="grid">
      <section class="card">
        <h2 style="font-size:18px;margin-bottom:12px;">用户管理</h2>
        <div class="field">
          <label for="adminSearch">注册名字</label>
          <input id="adminSearch" placeholder="输入用户名搜索">
        </div>
        <button class="primary" id="findUser">查找用户</button>
        <div id="adminUserBox" class="panel" style="margin-top:12px;"><p class="muted">还没有选中用户</p></div>
        <div class="field" style="margin-top:12px;">
          <label for="grantAmount">发放积分</label>
          <input id="grantAmount" type="number" min="1" value="1000000">
        </div>
        <button class="primary" id="grantPoints">给该用户加积分</button>
        <div class="panel" style="margin-top:12px;">
          <h3 style="font-size:16px;margin-bottom:10px;">测试工具</h3>
          <div class="field">
            <label for="forcedResult">选中用户下一局结果</label>
            <select id="forcedResult">
              <option value="random">随机</option>
              <option value="win">下一局赢</option>
              <option value="lose">下一局输</option>
            </select>
          </div>
          <button class="secondary" id="setForcedResult" style="width:100%;">保存测试结果</button>
          <p class="muted" style="margin-top:10px;">只影响一次，执行后自动恢复随机，流水会显示测试赢/测试输。</p>
        </div>
        <div class="cleanup-panel">
          <h3>流水清理状态</h3>
          <div class="cleanup-grid" id="cleanupStatus"></div>
        </div>
        <button class="secondary danger" id="clearOldLogs" style="width:100%;margin-top:12px;">清理 7 天前流水</button>
      </section>
      <section class="stack">
        <div class="card">
          <h2 style="font-size:18px;margin-bottom:12px;">用户列表</h2>
          <div class="filters" style="grid-template-columns:1fr auto;">
            <input id="userListFilter" placeholder="筛选用户名">
            <button class="secondary" id="refreshUserList">刷新</button>
          </div>
          <div class="log-summary" id="userListSummary"></div>
          <table>
            <thead><tr><th>用户</th><th>余额</th><th>7天下注</th><th>净结果</th><th>操作</th></tr></thead>
            <tbody id="userListTable"></tbody>
          </table>
        </div>
        <div class="card">
          <h2 style="font-size:18px;margin-bottom:12px;">积分申请</h2>
          <table>
            <thead><tr><th>时间</th><th>用户</th><th>数量</th><th>操作</th></tr></thead>
            <tbody id="requestTable"></tbody>
          </table>
        </div>
        <div class="card">
          <h2 style="font-size:18px;margin-bottom:12px;">游戏胜率配置</h2>
          <div class="rates" id="oddsConfig"></div>
        </div>
        <div class="card">
          <h2 style="font-size:18px;margin-bottom:12px;">待结算赛事单</h2>
          <div class="filters" style="grid-template-columns:1fr 1fr auto auto;">
            <input id="pendingUserFilter" placeholder="按用户筛选">
            <input id="pendingTextFilter" placeholder="按赛事 / 盘口筛选">
            <button class="secondary" id="filterPendingSelected">选中用户</button>
            <button class="secondary" id="exportPendingBets">导出CSV</button>
          </div>
          <div class="log-summary" id="pendingSummary"></div>
          <table>
            <thead><tr><th>时间</th><th>用户</th><th>赛事</th><th>下注</th><th>预计返还</th><th>操作</th></tr></thead>
            <tbody id="pendingBets"></tbody>
          </table>
        </div>
        <div class="card">
          <h2 style="font-size:18px;margin-bottom:12px;">全部流水</h2>
          <div class="filters">
            <input id="logUserFilter" placeholder="按用户筛选">
            <input id="logTextFilter" placeholder="按游戏 / 赛事筛选">
            <select id="logStatusFilter">
              <option value="">全部状态</option>
              <option value="赢">赢</option>
              <option value="输">输</option>
              <option value="发放">发放</option>
              <option value="待结算">待结算</option>
            </select>
          </div>
          <div class="quick-filters" id="logQuickFilters">
            <button class="quick-filter active" data-log-quick="">全部</button>
            <button class="quick-filter" data-log-quick="待结算">待结算</button>
            <button class="quick-filter" data-log-quick="赢">赢</button>
            <button class="quick-filter" data-log-quick="输">输</button>
            <button class="quick-filter" data-log-quick="发放">发放</button>
            <button class="quick-filter" data-log-quick="测试">测试</button>
            <button class="quick-filter" id="exportLogs">导出CSV</button>
          </div>
          <div class="log-summary" id="logSummary"></div>
          <div class="log-insights" id="logInsights"></div>
          <table>
            <thead><tr><th>时间</th><th>用户</th><th>项目</th><th>下注</th><th>结果</th></tr></thead>
            <tbody id="adminLogs"></tbody>
          </table>
        </div>
      </section>
    </div>
  </div>
  <div id="toast" class="toast"></div>
  <script>
    const STORE_KEY = "win10bet_state_v1";
    const DAY = 24 * 60 * 60 * 1000;
    const now = () => new Date().toISOString();
    const fmt = value => Number(value || 0).toLocaleString("zh-CN");
    const timeFmt = iso => new Date(iso).toLocaleString("zh-CN", { hour12: false });
    const defaultState = {
      users: {},
      currentUser: "",
      requests: [],
      logs: [],
      openBets: [],
      testOverrides: {},
      odds: {
        sports: 50,
        blackjack: 49, baccarat: 48, niuniu: 48, dragon: 48, zhajinhua: 47, texas: 47, sangong: 48,
        showhand: 46, paijiu: 47, teenpatti: 47, ander: 48,
        thor: 44, fortune: 44, aztec: 44, "dragon-treasure": 44, "space-spin": 44, fruit: 45,
        "candy-pop": 45, "gold-panther": 44, "neon-gate": 44,
        runner: 48, mines: 48, plinko: 48, dice: 46, fish: 46, crashcar: 47,
        roulette: 47, sicbo: 46, penalty: 48, duel: 48, derby: 47, hoops: 48,
        darts: 48, bowling: 47, nineball: 47, boxing: 48, serve: 48, moto: 47, keeper: 48, "space-race": 47
      }
    };
    let state = load();
    let selectedUser = "";

    function load() {
      const raw = localStorage.getItem(STORE_KEY);
      const data = raw ? JSON.parse(raw) : defaultState;
      data.logs = (data.logs || []).filter(log => Date.now() - new Date(log.time).getTime() <= 7 * DAY);
      return {
        ...defaultState,
        ...data,
        openBets: data.openBets || [],
        testOverrides: { ...(data.testOverrides || {}) },
        odds: { ...defaultState.odds, ...(data.odds || {}) }
      };
    }
    function save() {
      state.logs = state.logs.filter(log => Date.now() - new Date(log.time).getTime() <= 7 * DAY);
      localStorage.setItem(STORE_KEY, JSON.stringify(state));
    }
    function showToast(message) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove("show"), 2200);
    }
    function addLog(name, item, stake, result, status) {
      state.logs.unshift({ time: now(), user: name, item, stake, result, status });
      save();
    }
    function statusClass(status) {
      if (/待结算/.test(status)) return "status-pending";
      if (/赢|发放|注册/.test(status)) return "status-win";
      if (/输/.test(status)) return "status-lose";
      return "";
    }
    function userActivitySummary(logs, pending) {
      const sports = logs.filter(log => /世界杯|NBA|赛事|FIFA|Pro League|Masters|Cup/.test(log.item)).length + pending.length;
      const games = logs.filter(log => /游戏局|飞行|地雷|弹珠|捕鱼|老虎机/.test(log.item)).length;
      const points = logs.filter(log => /积分|发放|申请|注册/.test(log.item)).length;
      const topType = [
        ["游戏", games],
        ["赛事", sports],
        ["积分", points]
      ].sort((a, b) => b[1] - a[1])[0];
      const recentStake = logs.find(log => Number(log.stake || 0) > 0);
      const pendingStake = pending.reduce((sum, bet) => sum + Number(bet.stake || 0), 0);
      const pendingPayout = pending.reduce((sum, bet) => sum + Number(bet.payout || 0), 0);
      return {
        type: topType && topType[1] ? topType[0] : "暂无",
        recent: recentStake ? timeFmt(recentStake.time) : "暂无下注",
        pendingStake,
        pendingPayout
      };
    }
    function renderStats() {
      const users = Object.values(state.users || {});
      const totalBalance = users.reduce((sum, item) => sum + Number(item.balance || 0), 0);
      const today = state.logs.filter(log => Date.now() - new Date(log.time).getTime() <= DAY);
      const staked = today.reduce((sum, log) => sum + Number(log.stake || 0), 0);
      const cards = [
        ["注册用户", users.length],
        ["总积分余额", fmt(totalBalance)],
        ["待发放申请", state.requests.length],
        ["待结算赛事", (state.openBets || []).length],
        ["今日流水下注", fmt(staked)],
        ["7天流水条数", state.logs.length],
        ["测试账号", Object.keys(state.testOverrides || {}).length],
        ["当前后台", "独立页面"]
      ];
      document.getElementById("adminStats").innerHTML = cards.map(([label, value]) => `<div class="stat-card"><span>${label}</span><strong>${value}</strong></div>`).join("");

    function approveRequest(id) {
      const req = state.requests.find(item => item.id === id);
      if (!req || !state.users[req.user]) return;
      state.users[req.user].balance += Number(req.amount);
      addLog(req.user, "后台发放积分", 0, Number(req.amount), "发放");
      state.requests = state.requests.filter(item => item.id !== id);
      save();
      renderAll();
    }
    function settlePendingBet(id, resultType) {
      const bet = (state.openBets || []).find(item => item.id === id);
      if (!bet) return showToast("找不到这张待结算单");
      const account = state.users[bet.user];
      if (!account) return showToast("找不到下注用户");
      let result = 0;
      let status = "输";
      if (resultType === "win") {
        result = Number(bet.payout || 0);
        account.balance += result;
        status = "后台结算赢";
      } else if (resultType === "void") {
        result = Number(bet.stake || 0);
        account.balance += result;
        status = "后台作废退回";
      } else {
        status = "后台结算输";
      }
      state.openBets = (state.openBets || []).filter(item => item.id !== id);
      addLog(bet.user, `${bet.item} ${status}`, Number(bet.stake || 0), result, status);
      save();
      renderAll();
      showToast(`${bet.user} 的赛事单已${resultType === "win" ? "结算赢" : resultType === "void" ? "作废退回" : "结算输"}`);
    }

        selectedUser = state.users[name] ? name : "";
        renderUser();
        if (!selectedUser) showToast("找不到这个用户");
      }
      if (target.dataset.selectUser) {
        selectedUser = target.dataset.selectUser;
        document.getElementById("adminSearch").value = selectedUser;
        renderUser();
        document.getElementById("adminUserBox")?.scrollIntoView({ behavior: "smooth", block: "start" });
        showToast(`已选中 ${selectedUser}`);
      }
      if (target.id === "refreshUserList") renderUserList();
      if (target.id === "filterSelectedUser") {
        if (!selectedUser) return showToast("请先查找用户");
        document.getElementById("logUserFilter").value = selectedUser;
        renderLogs();
        document.getElementById("adminLogs")?.closest(".card")?.scrollIntoView({ behavior: "smooth", block: "start" });
        showToast(`已筛选 ${selectedUser} 的流水`);
      }
      if (target.id === "filterPendingSelected") {
        if (!selectedUser) return showToast("请先查找用户");
        document.getElementById("pendingUserFilter").value = selectedUser;
        renderPendingBets();
        showToast(`已筛选 ${selectedUser} 的待结算单`);
      }
      if (target.id === "copySelectedUser") {
        if (!selectedUser) return showToast("请先查找用户");
        document.getElementById("adminSearch").value = selectedUser;
        navigator.clipboard?.writeText(selectedUser).catch(() => {});
        showToast(`已复制/填入 ${selectedUser}`);
      }
      if (target.dataset.logQuick !== undefined) {
        const value = target.dataset.logQuick;
        document.getElementById("logStatusFilter").value = ["赢", "输", "发放", "待结算"].includes(value) ? value : "";
        document.getElementById("logTextFilter").value = value === "测试" ? "测试" : "";
        renderLogs();
      }
      if (target.id === "exportLogs") exportLogsCsv();
      if (target.id === "exportPendingBets") exportPendingBetsCsv();
      if (target.id === "grantPoints") {
        const amount = Number(document.getElementById("grantAmount").value);
        if (!selectedUser || !state.users[selectedUser]) return showToast("请先查找用户");
        if (!amount || amount < 1) return showToast("请输入发放数量");
        state.users[selectedUser].balance += amount;
        addLog(selectedUser, "后台手动加积分", 0, amount, "发放");
        save();
        renderAll();
      }
      if (target.id === "setForcedResult") {
        if (!selectedUser || !state.users[selectedUser]) return showToast("请先查找用户");
        const value = document.getElementById("forcedResult").value;
        if (value === "random") delete state.testOverrides[selectedUser];
        else state.testOverrides[selectedUser] = value;
        save();
        renderAll();
      }
      if (target.id === "clearOldLogs") {
        state.logs = state.logs.filter(log => Date.now() - new Date(log.time).getTime() <= 7 * DAY);
        save();
        renderAll();
        showToast("已清理 7 天前流水");
      }
      if (target.dataset.approve) approveRequest(target.dataset.approve);
      if (target.dataset.settleBet) settlePendingBet(target.dataset.settleBet, target.dataset.settleResult);
    });

    document.addEventListener("change", event => {
      const input = event.target.closest("[data-rate]");
      if (!input) {
        if (event.target && event.target.id === "logStatusFilter") renderLogs();
        return;
      }
      const value = Math.max(1, Math.min(95, Number(input.value) || 1));
      state.odds[input.dataset.rate] = value;
      save();
      renderOdds();
    });

    document.addEventListener("input", event => {
      if (event.target && (event.target.id === "logUserFilter" || event.target.id === "logTextFilter")) renderLogs();
      if (event.target && (event.target.id === "pendingUserFilter" || event.target.id === "pendingTextFilter")) renderPendingBets();
      if (event.target && event.target.id === "userListFilter") renderUserList();
    });

    renderAll();
  </script>
</body>
</html>
